<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>테스트용2</title>
  </head>

  <body>
    <h1>[ Ajax 테스트 2 - 객체 보내기 받기 ]</h1>

    <p>1. 서버로 각각의 parameter 전달</p>
    <form id="writeForm1">
      이름 <input type="text" id="name1"><br>
      나이 <input type="number" id="age1" value="0"><br>
      전화 <input type="text" id="phone1"><br>
      <input type="button" id="formButton1" value="보내기">
    </form>
    <p>2. 서버로 DTO 객체로 전달 1</p>
    <form id="writeForm2">
      이름 <input type="text" id="name2"><br>
      나이 <input type="number" id="age2" value="0"><br>
      전화 <input type="text" id="phone2"><br>
      <input type="button" id="formButton2" value="보내기">
    </form>
    <p>3. 서버로 DTO 객체로 전달 2</p>
    <form id="writeForm3">
      이름 <input type="text" id="name3" name="name"><br>
      나이 <input type="number" id="age3" name="age" value="0"><br>
      전화 <input type="text" id="phone3" name="phone"><br>
      <input type="button" id="formButton3" value="보내기">
    </form>
    <p>4. 서버로부터 DTO 객체의 값을 String으로 받기</p>
    <p><input type="button" value="서버에서 객체 받기" id="bt1"></p>
    <div id="outputDiv1"></div>
    <p>5. 서버로부터 DTO 객체의 값을 JSON으로 받기</p>
    <p><input type="button" value="서버에서 객체 받기" id="bt2"></p>
    <div id="outputDiv2"></div>
    <p>6. 서버로부터 리스트 받기</p>
    <p><input type="button" value="서버에서 리스트 받기" id="bt3"></p>
    <div id="outputDiv3"></div>
    <p>7. 서버로 배열 보내기</p>
    <p><input type="button" value="서버로 배열 보내기" id="bt4"></p>
    <p>8. 서버로 객체 배열 보내기_문자열로 변환해서 전달 방식</p>
    <p><input type="button" value="서버로 객체 배열 보내기" id="bt5"></p>
    <p>9. 서버로 객체 배열 보내기_json구조 그대로 보내기</p>
    <p><input type="button" value="서버로 객체 배열 보내기" id="bt6"></p>
  </body>
  <script>
    document.getElementById('formButton1').addEventListener('click', formSubmit1);
    document.getElementById('formButton2').addEventListener('click', formSubmit2);
    document.getElementById('formButton3').addEventListener('click', formSubmit3);
    document.getElementById('bt1').addEventListener('click', getObject1);
    document.getElementById('bt2').addEventListener('click', getObject2);
    document.getElementById('bt3').addEventListener('click', getList);
    document.getElementById('bt4').addEventListener('click', sendArray);
    document.getElementById('bt5').addEventListener('click', sendObjectArray);
    document.getElementById('bt6').addEventListener('click', sendJsonArray);

    // 1. 개별 파라미터 전송 @RequestParam기반 바인딩
    function formSubmit1() {
      const n = document.getElementById('name1').value;
      const a = document.getElementById('age1').value;
      const p = document.getElementById('phone1').value;

      // 유효성 검사 (최소한으로 입력 검증)
      if (n === '') {
        alert('이름을 입력하세요');
        return;
      }
      if (a === '' || isNaN(a)) {
        alert('나이는 숫자로 입력하세용');
        return;
      }

      const datas = new URLSearchParams({
        name: n
        , age: a
        , phone: p
      });

      fetch('insert1', {
        method: 'POST'
        , headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        }
        , body: datas
      })
        .then(() => {
          alert('저장되었습니다');
          // 값 전달 후 입력란 초기화
          document.getElementById('name1').value = '';
          document.getElementById('age1').value = 0;
          document.getElementById('phone1').value = '';
        })
        .catch(() => alert('전송실패'));
    }

    // 2. 객체 전송 (컨트롤러에서는DTO와 바인딩)
    //
    function formSubmit2() {
      const n = document.getElementById('name2').value;
      const a = document.getElementById('age2').value;
      const p = document.getElementById('phone2').value;
      const ob = {
        name: n
        , age: a
        , phone: p
      };
      const params = new URLSearchParams(ob);

      fetch('insert2', {
        method: 'POST'
        , headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        }
        , body: params
      })
        .then(() => {
          alert('전송되었습니다');
          // 값 전달 후 입력란 초기화
          document.getElementById('name2').value = '';
          document.getElementById('age2').value = 0;
          document.getElementById('phone2').value = '';
        })
        .catch(() => alert('전송실패'));
    }

    // 3. form 
    function formSubmit3() {
      // 폼 요소 안의 입력치를 json으로 변환해서 서버에 보내는 방법
      // form요소를 그대로 전송하여 name 속성 기반의 자동 바인딩
      const form = document.getElementById('writeForm3');
      const formData = new FormData(form);

      fetch('insert3', {
        method: 'POST'
        // 헤더 지정 없이 값 전달
        , body: formData
      });
    }

    // 4. 객체를 문자열로 받기
    function getObject1() {
      fetch('getObject')
        .then(response => response.text()) // responseBody 내 텍스트 얻기
        .then(text => {
          document.getElementById('outputDiv1').innerHTML = text;
        })
        .catch(e => alert(JSON.stringify(e)))
        ;
    }

    // 5. 객체를 JSON으로 받기
    function getObject2() {
      fetch('getObject')
        .then(response => response.json())  // responseBody JSON으로 변환
        .then(obj => {
          const str = `
            받은 객체 : ${obj}<br>
            받은 객체 : ${JSON.stringify(obj)}<br>
            이름 : ${obj.name}<br>
            나이 : ${obj.age}<br>
            전화 : ${obj.phone}<br>
          `;
          document.getElementById('outputDiv2').innerHTML = str;
        })
        .catch(e => alert(JSON.stringify(e)))
        ;
    }

    // 6. 리스트 받아서 화면에 보여주기
    function getList() {
      fetch('getList')
        .then(response => response.json())
        .then(people => {
          let str = '<table>';

          // json내 객체가 중첩되어 있으므로 반복문으로 꺼내기
          people.forEach((person, index) => {
            str += `<tr>
              <td>${index}</td>
              <td>${person.name}</td>
              <td>${person.age}</td>
              <td>${person.phone}</td>
            </tr>`;
          });

          str += '</table>';
          document.getElementById('outputDiv3').innerHTML = str;
        })
        .catch(e => console.log(JSON.stringify(e)))
        ;
    }

    // 7. 배열 보내기
    function sendArray() {
      const ar = ['aaa', 'bbb', 'ccc'];
      const params = new URLSearchParams();

      ar.forEach(val => params.append('ar', val));

      fetch('sendArray', {
        method: 'POST'
        , headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        }
        , body: params
      })
        .then(() => alert('보냈습니다'))
        .catch(e => alert(JSON.stringify(e)))
        ;
    }
    const people = [
      {
        name: "홍길동",
        age: "20",
        phone: "00-00000"
      },
      {
        name: "강감찬",
        age: "30",
        phone: "010-2222-2222"
      },
      {
        name: "이순신",
        age: "40",
        phone: "010-3333-3333"
      }
    ];
    // 8. 객체배열보내기
    // js객체 배열을 form-urlencoded방식에서 DTO자동바인딩이 안됨
    // JSON 문자열로 변환하여 전달하고 서버에서 파싱하도록 함
    function sendObjectArray() {
      fetch('sendObjectArray', {
        method: 'POST'
        , headers: {
          'Content-Type': 'application/x-www-form-urlencoded'
        }
        , body: new URLSearchParams({
          ar: JSON.stringify(people)
        })
      })
        .then(() => alert('보냈습니다'))
        .catch(e => alert(JSON.stringify(e)))
        ;
    }
    // 9. 객체배열보내기 - 데이터 구조 그대로
    function sendJsonArray() {
      fetch('sendJsonArray', {
        method: 'POST'
        , headers: {
          'Content-Type': 'application/json'  // 달라진 부분
        }
        , body: JSON.stringify(people)  // 달라진 부분
      })
        .then(() => alert('보냈습니다'))
        .catch(e => alert(JSON.stringify(e)))
        ;
    }

  </script>

</html>
