<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>댓글 모아보기</title>
  </head>

  <body>
    <h1>댓글 모아보기</h1>
    <!-- 댓글 작성 폼 -->
    <div>
      <input type="text" id="name" placeholder="작성자명을 입력하세요">
      <input type="text" id="comment" placeholder="댓글 내용을 입력하세요">
      <button id="inputButton">저장</button>
    </div>
    <!-- 댓글 목록 부분 -->
    <table>
      <thead>
        <tr>
          <th>번호</th>
          <th>작성자</th>
          <th>내용</th>
          <th>수정</th>
          <th>삭제</th>
        </tr>
      </thead>
      <tbody id="commentTbody">
        <!-- 댓글 출력부분 -->
      </tbody>
    </table>
  </body>

  <script th:inline="javascript">
    const API_BASE = /*[[ @{/api} ]]*/ '';
  </script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 초기 목록 조회
      list();

      // 댓글 저장
      document.getElementById('inputButton').addEventListener('click', inputButtonClick);

      // 삭제 및 수정 이벤트 위임
      document.getElementById('commentTbody').addEventListener('click', tbodyClickHandler);

    });

    // tbody 클릭 이벤트 처리 (삭제/수정)
    function tbodyClickHandler(e) {
      // 삭제 버튼이면 부여할 이벤트
      if (e.target.classList.contains('deleteButton')) {
        // 댓글을 삭제한다
        deleteComment(e.target.dataset.num);
      }

      // 수정 버튼이면 부여할 이벤트
      if (e.target.classList.contains('updateButton')) {
        console.log(e.target);
        updateComment(e.target);
      }
    }

    // 수정
    function updateComment(button) {
      // 버튼이 속해있는 tr찾기
      const tr = button.closest('tr');
      // 갱신할 댓글요소 식별자 num
      const num = tr.querySelector('.numTd').textContent;
      // 갱신 전 댓글본문을 담고있는 요소
      const commentTd = tr.querySelector('.commentTd');
      // 갱신 전 댓글본문
      const oldComment = commentTd.textContent;

      // 입력받은 새 댓글본문
      const newComment = prompt('수정할 내용을 입력하세요', oldComment);

      if (newComment && newComment.trim() !== '') { // 유효성검사
        // 수정 요청 보내기
        // PATCH ${baseurl}/api/comments/${num} // 일부값만 받고서 값을 교체
        // PUT ${baseurl}/api/comments/${num}   // 리소스 전체를 새 상태로 교체
        fetch(`${API_BASE}/comments/${num}`, {
          method: 'PATCH'
          , headers: { 'Content-Type': 'application/json' }
          , body: JSON.stringify({
            comment: newComment
          })
        })
          .then(() => list())
          .catch(() => alert('수정실패'))
          ;
      }
    }

    // 삭제
    function deleteComment(num) {
      // DELETE ${API_BASE}/comments/${num}
      fetch(`${API_BASE}/comments/${num}`, {
        method: 'DELETE'
      })
        .then(() => list())
        .catch(() => alert('삭제실패'))
        ;
    }
    function inputButtonClick() {
      // 입력요소내 값 읽어오기 (작성자, 댓글본문)
      const name = document.getElementById('name').value.trim();
      const comment = document.getElementById('comment').value.trim();
      // 입력내용 최소한 검증 하기 (예. 빈 값이 들어감, 이름이 짧음 등)
      if (!name || !comment) {
        alert('이름과 내용을 입력하세요.');
        return;
      }
      // 입력요소의 값 서버로 보내기
      // POST ${urlBase}/api/comments
      //
      // {
      //    "name" : "이",
      //    "comment" : "새로작성한 댓글"
      // }
      fetch(`${API_BASE}/comments`, {
        method: 'POST'
        , headers: { 'Content-Type': 'application/json' }
        , body: JSON.stringify({ name, comment })
      })
        .then(() => {
          // 입력란 비우기
          document.getElementById('name').value = '';
          document.getElementById('comment').value = '';
          list();
        });
    }
    function list() {
      // GET ${API_BASE}/comments  # 댓글목록가져오기
      fetch(`${API_BASE}/comments`)
        .then(res => res.json())
        .then(list => {
          const tbody = document.getElementById('commentTbody');
          tbody.innerHTML = '';
          list.forEach(element => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td class="numTd">${element.num}</td>
              <td>${element.name}</td>
              <td class="commentTd">${element.comment}</td>
              <td><button class="updateButton">수정</button></td>
              <td><button class="deleteButton" data-num="${element.num}">삭제</button></td>
            `;
            tbody.appendChild(tr);
          });
        })
        .catch(() => { alert('목록 조회 실패'); })
        ;
    }
  </script>

</html>
